name: Publish Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0.0

jobs:
  build_release:
    name: Build and Publish Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Use the latest SDK matching project net10.0-windows

      - name: Install Npcap/WinPcap dependencies (Optional check)
        run: echo "Skipping driver installation for CI, we only need to compile."

      - name: Publish NetworkAnalysisApp (win-x64)
        run: dotnet publish src/NetworkAnalysisApp/NetworkAnalysisApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o src/publish/NetworkAnalysisApp-win-x64

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: NetworkAnalysisApp-win-x64
          path: src/publish/NetworkAnalysisApp-win-x64

      - name: Zip the output
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'NetworkAnalysisApp-v1.0.0-win-x64.zip'
          directory: 'src/publish/NetworkAnalysisApp-win-x64'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 'src/publish/NetworkAnalysisApp-win-x64/NetworkAnalysisApp-v1.0.0-win-x64.zip'
          generate_release_notes: true
          draft: false
          prerelease: false
